name: Build and Release Confidential Micro-Loader

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Measure
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev wget rpm2cpio cpio jq python3 python3-pip ccache

      - name: Setup Rust Toolchain
        run: |
          rustup toolchain install 1.95.0
          rustup default 1.95.0
          rustup target add x86_64-unknown-linux-musl

      - name: Cache Kernel ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          target-dir: target

      - name: Build Linux Kernel (bzImage)
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.cache/ccache
          ccache -M 2G
          ccache -z
          chmod +x build_kernel.sh
          ./build_kernel.sh
          ccache -s

      - name: Build Rust Bootloader
        run: |
          RUSTFLAGS="--remap-path-prefix $(pwd)=/workspace" cargo build --release --target x86_64-unknown-linux-musl

      - name: Create Reproducible Initramfs (CPIO)
        run: |
          mkdir -p rootfs/proc rootfs/sys rootfs/dev rootfs/tmp
          cp target/x86_64-unknown-linux-musl/release/sev-micro-loader rootfs/init
          find rootfs -exec touch -h -d @0 {} +
          cd rootfs
          find . -mindepth 1 | LC_ALL=C sort | cpio -o -H newc -R 0:0 --reproducible > ../zero_trust_os.cpio
          cd ..

      - name: Prepare SEV-SNP Measurement Tools
        run: |
          git clone https://github.com/virtee/sev-snp-measure.git
          wget https://download.rockylinux.org/pub/rocky/10.1/devel/x86_64/os/Packages/e/edk2-ovmf-20250523-2.el10.noarch.rpm
          rpm2cpio edk2-ovmf-20250523-2.el10.noarch.rpm | cpio -idmv

      - name: Compute SEV-SNP Measurement
        run: |
          pip3 install -r ./sev-snp-measure/requirements.txt
          python3 ./sev-snp-measure/sev-snp-measure.py \
              --mode snp \
              --vcpus=2 \
              --vcpu-type=EPYC-v3 \
              --ovmf=./usr/share/edk2/ovmf/OVMF.amdsev.fd \
              --kernel=./linux-6.12.91/arch/x86/boot/bzImage \
              --initrd=./zero_trust_os.cpio \
              --append="console=ttyS0 ip=dhcp" > sev_measurement.txt

      - name: Generate Hashes for Release Notes
        id: hashes
        run: |
          # 1. zero_trust_os.cpio SHA-256
          CPIO_HASH=$(sha256sum zero_trust_os.cpio | awk '{print $1}')
          
          # 2. bzImage SHA-256 (Kernel build folder contains absolute paths in .cmd files)
          KERNEL_BZIMAGE_HASH=$(sha256sum linux-6.12.91/arch/x86/boot/bzImage | awk '{print $1}')
          
          # 3. Static OVMF Hash
          OVMF_HASH=$(sha256sum usr/share/edk2/ovmf/OVMF.amdsev.fd | awk '{print $1}')
          
          # 4. Final SEV-SNP Measurement
          SNP_HASH=$(cat sev_measurement.txt)

          # Output to GitHub Actions environment
          echo "CPIO_HASH=$CPIO_HASH" >> $GITHUB_ENV
          echo "KERNEL_BZIMAGE_HASH=$KERNEL_BZIMAGE_HASH" >> $GITHUB_ENV
          echo "OVMF_HASH=$OVMF_HASH" >> $GITHUB_ENV
          echo "SNP_HASH=$SNP_HASH" >> $GITHUB_ENV

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cat <<EOF > release_notes.md
          ## Confidential Micro-Loader Release

          This release contains the fully reproducible \`zero_trust_os.cpio\` RAM-only bootloader filesystem.

          ### Mathematical Auditing & Verification
          Below are the reproducible SHA-256 hashes for this build. You can compile the source code from this exact tag to verify these exact measurements.

          | Artifact | SHA-256 Hash |
          | :--- | :--- |
          | **1. Initramfs (CPIO)** | \`${{ env.CPIO_HASH }}\` |
          | **2. Linux Kernel (bzImage)** | \`${{ env.KERNEL_BZIMAGE_HASH }}\` |
          | **3. OVMF Firmware** | \`${{ env.OVMF_HASH }}\` |
          | **4. Final SEV-SNP Measurement** | \`${{ env.SNP_HASH }}\` |

          The final SEV-SNP Measurement should match the \`attestation_report_hex\` value returned by the live hardware attestation.
          EOF

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            zero_trust_os.cpio
            sev_measurement.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
