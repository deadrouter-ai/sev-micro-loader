name: Build and Release Confidential Micro-Loader

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_and_release:
    name: Build & Measure
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Cache Kernel ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          target-dir: target

      - name: Run Reproducible Build in Docker
        run: |
          chmod +x build_reproducible.sh
          ./build_reproducible.sh

      - name: Generate Hashes for Release Notes
        id: hashes
        run: |
          # 1. zero_trust_os.cpio SHA-256
          CPIO_HASH=$(sha256sum zero_trust_os.cpio | awk '{print $1}')
          
          # 2. bzImage SHA-256 (Kernel build folder contains absolute paths in .cmd files)
          KERNEL_BZIMAGE_HASH=$(sha256sum linux-6.12.91/arch/x86/boot/bzImage | awk '{print $1}')
          
          # 3. Static OVMF Hash
          OVMF_HASH=$(sha256sum usr/share/edk2/ovmf/OVMF.amdsev.fd | awk '{print $1}')
          
          # 4. Final SEV-SNP Measurement
          SNP_HASH=$(cat sev_measurement.txt)

          # Output to GitHub Actions environment
          echo "CPIO_HASH=$CPIO_HASH" >> $GITHUB_ENV
          echo "KERNEL_BZIMAGE_HASH=$KERNEL_BZIMAGE_HASH" >> $GITHUB_ENV
          echo "OVMF_HASH=$OVMF_HASH" >> $GITHUB_ENV
          echo "SNP_HASH=$SNP_HASH" >> $GITHUB_ENV

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cat <<EOF > release_notes.md
          Below are the reproducible hashes for this build. You can compile the source code from this exact tag to verify these exact measurements.

          > **Note**: Reproducible builds for the Linux Kernel require the exact same compiler version. You can run `./build_reproducible.sh` to compile these artifacts locally using a pristine **Ubuntu 26.04** Docker container with **GCC 11.4.0** and **Rust 1.95.0**.

          | Artifact | Hash |
          | :--- | :--- |
          | **1. Initramfs (CPIO)** | \`${{ env.CPIO_HASH }}\` |
          | **2. Linux Kernel (bzImage)** | \`${{ env.KERNEL_BZIMAGE_HASH }}\` |
          | **3. OVMF Firmware** | \`${{ env.OVMF_HASH }}\` |
          | **4. Final SEV-SNP Measurement** | \`${{ env.SNP_HASH }}\` |

          The final SEV-SNP Measurement should match the \`attestation_report_hex\` value returned by the live hardware attestation.
          EOF

      - name: Attest Build Provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            zero_trust_os.cpio
            sev_measurement.txt
            linux-6.12.91/arch/x86/boot/bzImage
            usr/share/edk2/ovmf/OVMF.amdsev.fd

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            zero_trust_os.cpio
            sev_measurement.txt
            linux-6.12.91/arch/x86/boot/bzImage
            usr/share/edk2/ovmf/OVMF.amdsev.fd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
