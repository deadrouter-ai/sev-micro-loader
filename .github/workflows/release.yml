name: Build and Release Confidential Micro-Loader

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_and_release:
    name: Build & Measure
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Cache Kernel ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: Run Reproducible Build in Docker
        run: |
          chmod +x build_reproducible.sh
          ./build_reproducible.sh

      - name: Generate Hashes for Release Notes
        id: hashes
        run: |
          # 1. zero_trust_os.cpio SHA-384
          CPIO_HASH=$(sha384sum zero_trust_os.cpio | awk '{print $1}')
          
          # 2. bzImage SHA-384 (Kernel build folder contains absolute paths in .cmd files)
          KERNEL_BZIMAGE_HASH=$(sha384sum linux-kernel/arch/x86/boot/bzImage | awk '{print $1}')
          
          # 3. Static OVMF Hash
          OVMF_HASH=$(sha384sum usr/share/edk2/ovmf/OVMF.amdsev.fd | awk '{print $1}')
          
          # 4. Libvirt XML Hash
          XML_HASH=$(sha384sum q35-sev-snp-unikernel.xml | awk '{print $1}')
          
          # 5. Final SEV-SNP Measurement
          SNP_HASH=$(cat sev_measurement.txt)

          # Output to GitHub Actions environment
          echo "CPIO_HASH=$CPIO_HASH" >> $GITHUB_ENV
          echo "KERNEL_BZIMAGE_HASH=$KERNEL_BZIMAGE_HASH" >> $GITHUB_ENV
          echo "OVMF_HASH=$OVMF_HASH" >> $GITHUB_ENV
          echo "XML_HASH=$XML_HASH" >> $GITHUB_ENV
          echo "SNP_HASH=$SNP_HASH" >> $GITHUB_ENV

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cat > release_notes.md <<'ENDOFNOTES'
          ## Reproducible Build Hashes

          Every artifact below was compiled inside a deterministic Docker container (Ubuntu 24.04 + GCC 11.4.0 + Rust 1.95.0). You can reproduce these exact hashes on your own machine.

          | Artifact | SHA-384 Hash |
          | :--- | :--- |
          ENDOFNOTES
          echo "| **Initramfs** (zero_trust_os.cpio) | \`$CPIO_HASH\` |" >> release_notes.md
          echo "| **Linux Kernel** (bzImage) | \`$KERNEL_BZIMAGE_HASH\` |" >> release_notes.md
          echo "| **OVMF Firmware** (OVMF.amdsev.fd) | \`$OVMF_HASH\` |" >> release_notes.md
          echo "| **Libvirt Template** (q35-sev-snp-unikernel.xml) | \`$XML_HASH\` |" >> release_notes.md
          echo "| **SEV-SNP Measurement** | \`$SNP_HASH\` |" >> release_notes.md
          cat >> release_notes.md <<'ENDOFNOTES'

          The **SEV-SNP Measurement** is the value that AMD hardware will report in the attestation. If your locally computed measurement matches this value, you have mathematical proof that the release binary was compiled from this exact source code.

          ## How to Verify This Release

          **Prerequisites:** [Docker](https://docs.docker.com/get-docker/) must be installed.

          ```bash
          git clone https://github.com/deadrouter-ai/sev-micro-loader.git
          cd sev-micro-loader
          ENDOFNOTES
          echo "git checkout ${TAG}" >> release_notes.md
          cat >> release_notes.md <<'ENDOFNOTES'
          ./build_reproducible.sh
          ```

          When the script finishes, it prints the **Final SEV-SNP Measurement**. If it matches the value in the table above, the release is authentic and unmodified.

          > **Why Docker?** Different compiler versions produce different binaries. The Docker container ensures everyone uses the exact same toolchain, so the output is identical regardless of your host OS.

          ## Security Model

          - All download URLs and the Ed25519 signing key are **hardcoded** in the measured binary
          - The server source code is **fully public** — [view it here](https://github.com/deadrouter-ai/api-proxy-server)
          - Full documentation: [Threat Model](https://github.com/deadrouter-ai/sev-micro-loader/blob/main/docs/threat_model.md) · [Loader Security Audit](https://github.com/deadrouter-ai/sev-micro-loader/blob/main/docs/loader_security.md) · [Architecture](https://github.com/deadrouter-ai/sev-micro-loader/blob/main/docs/architecture.md)
          ENDOFNOTES

      - name: Attest Build Provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            zero_trust_os.cpio
            sev_measurement.txt
            linux-kernel/arch/x86/boot/bzImage
            usr/share/edk2/ovmf/OVMF.amdsev.fd
            q35-sev-snp-unikernel.xml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            zero_trust_os.cpio
            sev_measurement.txt
            linux-kernel/arch/x86/boot/bzImage
            usr/share/edk2/ovmf/OVMF.amdsev.fd
            q35-sev-snp-unikernel.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
